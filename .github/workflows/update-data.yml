name: Update data and deploy

# Runs daily at noon UTC (8am ET). Also triggerable manually.
# Required secret: REGS_API_KEY (your regulations.gov API key)

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Flask app dependencies
        run: pip install -r requirements.txt

      - name: Install embedding dependencies
        run: pip install -r requirements-embed.txt

      # Cache the sentence-transformers model (~90 MB) across workflow runs
      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2

      - name: Fetch document and docket metadata
        env:
          REGS_API_KEY: ${{ secrets.REGS_API_KEY }}
        run: python3 fetch.py

      - name: Enrich data (categories, locations, extensions)
        run: python3 enrich.py

      # Fetches Federal Register abstracts and full text for rules/proposed rules.
      # Add --skip-xml to fetch only abstracts without downloading full text.
      - name: Fetch Federal Register text
        run: python3 fetch_text.py

      - name: Generate semantic embeddings (incremental)
        run: python3 embed.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data/documents.json \
                  static/data/dockets.json \
                  static/data/by_state.json \
                  static/data/fr_text.json \
                  static/data/embeddings.json \
                  static/data/text/
          git diff --staged --quiet \
            && echo "No data changes — skipping commit" \
            || git commit -m "data: update $(date -u +%Y-%m-%d) [skip ci]"
          git push

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build static site
        run: python3 freeze.py

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          force_orphan: true
