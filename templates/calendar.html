{% extends "base.html" %}

{% block title %}Calendar — EPA Clean Air Act Tracker{% endblock %}

{% block head %}
<style>
/* ── Calendar layout ─────────────────────────────────────────────── */
.cal-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: center;
    font-family: Arial, sans-serif;
    font-size: 0.8rem;
    color: #555;
    margin-bottom: 1.25rem;
}
.cal-legend-swatch {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 2px;
    vertical-align: middle;
    margin-right: 4px;
}

.cal-grid-outer {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem 2rem;
}

.cal-month { }

.cal-month-head {
    font-family: Arial, sans-serif;
    font-size: 0.9rem;
    font-weight: bold;
    color: #1a3a4a;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 0 0 0.4rem;
}

.cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
}

.cal-dow {
    text-align: center;
    font-family: Arial, sans-serif;
    font-size: 0.68rem;
    color: #aaa;
    padding-bottom: 3px;
}

.cal-day {
    position: relative;
    min-height: 32px;
    padding: 3px 2px 2px;
    border-radius: 2px;
    background: #f0f0ee;
    border: 1px solid transparent;
    text-align: center;
    line-height: 1;
}

.cal-empty { background: transparent; border-color: transparent; }

.cal-day-num {
    font-family: Arial, sans-serif;
    font-size: 0.72rem;
    color: #999;
    display: block;
}

.cal-day.active .cal-day-num { color: #222; }

/* Activity levels */
.cal-day.lvl-1 { background: #cce5f5; }
.cal-day.lvl-2 { background: #74b9e8; }
.cal-day.lvl-3 { background: #2980b9; }
.cal-day.lvl-3 .cal-day-num { color: #fff; }
.cal-day.lvl-4 { background: #1a5276; }
.cal-day.lvl-4 .cal-day-num { color: #fff; }

/* Deadline ring */
.cal-day.has-deadline { border: 2px solid #c0392b; }

.cal-count {
    display: block;
    font-size: 0.65rem;
    font-family: Arial, sans-serif;
    font-weight: bold;
    margin-top: 1px;
}
.cal-day.lvl-1 .cal-count,
.cal-day.lvl-2 .cal-count { color: #1a3a4a; }
.cal-day.lvl-3 .cal-count,
.cal-day.lvl-4 .cal-count { color: #d6e9f8; }

.cal-day.clickable { cursor: pointer; }
.cal-day.clickable:hover { filter: brightness(0.92); }

.cal-deadline-flag {
    position: absolute;
    top: 1px;
    right: 2px;
    font-size: 0.55rem;
    line-height: 1;
}

/* ── Day detail panel ────────────────────────────────────────────── */
#day-panel {
    display: none;
    background: #fff;
    border: 1px solid #ddd;
    border-left: 4px solid #1a5276;
    padding: 1rem 1.25rem;
    margin-top: 1.5rem;
}

#day-panel-title {
    font-family: Arial, sans-serif;
    font-size: 1rem;
    font-weight: bold;
    color: #1a3a4a;
    margin: 0 0 0.75rem;
}

.panel-section { margin-bottom: 0.75rem; }

.panel-section strong {
    font-family: Arial, sans-serif;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #555;
}

.panel-section ul {
    margin: 0.3rem 0 0;
    padding-left: 1.25rem;
    font-size: 0.875rem;
}

.panel-section li { margin-bottom: 0.25rem; }

.panel-close {
    float: right;
    font-family: Arial, sans-serif;
    font-size: 0.8rem;
    color: #999;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
}

.panel-close:hover { color: #333; }

/* ── Responsive ──────────────────────────────────────────────────── */
@media (max-width: 900px) {
    .cal-grid-outer { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 560px) {
    .cal-grid-outer { grid-template-columns: 1fr; }
}
</style>
{% endblock %}

{% block content %}

<h2 class="section-head" style="margin-top:1rem;">Activity calendar</h2>

<div class="cal-legend">
    <span><span class="cal-legend-swatch" style="background:#f0f0ee; border:1px solid #ddd;"></span> No activity</span>
    <span><span class="cal-legend-swatch" style="background:#cce5f5;"></span> 1–2 docs</span>
    <span><span class="cal-legend-swatch" style="background:#74b9e8;"></span> 3–5 docs</span>
    <span><span class="cal-legend-swatch" style="background:#2980b9;"></span> 6–15 docs</span>
    <span><span class="cal-legend-swatch" style="background:#1a5276;"></span> 16+ docs</span>
    <span><span class="cal-legend-swatch" style="background:#f0f0ee; border:2px solid #c0392b;"></span> Comment deadline</span>
</div>

<div class="cal-grid-outer" id="cal-container"></div>

<div id="day-panel">
    <button class="panel-close" onclick="closePanel()">✕ close</button>
    <p id="day-panel-title"></p>
    <div id="day-panel-content"></div>
</div>

{% endblock %}

{% block scripts %}
<script>
const CAL_DATA  = {{ calendar_data | tojson }};
const DOC_BASE  = "{{ url_for('document', document_id='__ID__') }}".replace('__ID__', '');

const MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];
const DOW_LABELS  = ['Su','Mo','Tu','We','Th','Fr','Sa'];

function lvl(n) {
    if (n === 0) return 0;
    if (n <= 2)  return 1;
    if (n <= 5)  return 2;
    if (n <= 15) return 3;
    return 4;
}

function renderMonth(year, mon) {   // mon 1-based
    const monthStr = `${year}-${String(mon).padStart(2,'0')}`;

    const wrap = document.createElement('div');
    wrap.className = 'cal-month';

    const head = document.createElement('p');
    head.className = 'cal-month-head';
    head.textContent = `${MONTH_NAMES[mon-1]} ${year}`;
    wrap.appendChild(head);

    const grid = document.createElement('div');
    grid.className = 'cal-grid';

    DOW_LABELS.forEach(d => {
        const h = document.createElement('div');
        h.className = 'cal-dow';
        h.textContent = d;
        grid.appendChild(h);
    });

    const firstDow = new Date(year, mon - 1, 1).getDay();
    const daysInMon = new Date(year, mon, 0).getDate();

    for (let i = 0; i < firstDow; i++) {
        const e = document.createElement('div');
        e.className = 'cal-day cal-empty';
        grid.appendChild(e);
    }

    for (let d = 1; d <= daysInMon; d++) {
        const dateStr   = `${monthStr}-${String(d).padStart(2,'0')}`;
        const dayData   = CAL_DATA.by_date[dateStr]  || null;
        const deadlines = CAL_DATA.deadlines[dateStr] || null;
        const count     = dayData ? dayData.count : 0;
        const level     = lvl(count);

        const cell = document.createElement('div');
        cell.className = 'cal-day';
        if (count > 0 || deadlines) cell.classList.add('active');
        if (level > 0) cell.classList.add(`lvl-${level}`);
        if (deadlines) cell.classList.add('has-deadline');
        if (count > 0 || deadlines) {
            cell.classList.add('clickable');
            cell.dataset.date = dateStr;
            cell.addEventListener('click', showDay);
        }

        const num = document.createElement('span');
        num.className = 'cal-day-num';
        num.textContent = d;
        cell.appendChild(num);

        if (count > 0) {
            const cnt = document.createElement('span');
            cnt.className = 'cal-count';
            cnt.textContent = count;
            cell.appendChild(cnt);
        }

        if (deadlines) {
            const flag = document.createElement('span');
            flag.className = 'cal-deadline-flag';
            flag.title = `${deadlines.length} comment deadline${deadlines.length > 1 ? 's' : ''}`;
            flag.textContent = '⚑';
            cell.appendChild(flag);
        }

        grid.appendChild(cell);
    }

    wrap.appendChild(grid);
    return wrap;
}

function buildCalendar() {
    const [minY, minM] = CAL_DATA.min_date.split('-').map(Number);
    const [maxY, maxM] = CAL_DATA.max_date.split('-').map(Number);
    const container = document.getElementById('cal-container');

    let y = minY, m = minM;
    while (y < maxY || (y === maxY && m <= maxM)) {
        container.appendChild(renderMonth(y, m));
        m++;
        if (m > 12) { m = 1; y++; }
    }
}

function typeBadgeClass(t) {
    if (t === 'Rule')                        return 'badge-type-Rule';
    if (t === 'Proposed Rule')               return 'badge-type-Proposed';
    if (t === 'Notice')                      return 'badge-type-Notice';
    if (t === 'Supporting & Related Material') return 'badge-type-Supporting';
    return 'badge-type-Other';
}

function typeShort(t) {
    if (t === 'Proposed Rule')               return 'Proposed';
    if (t === 'Supporting & Related Material') return 'Support';
    return t || '—';
}

function showDay(e) {
    const date = e.currentTarget.dataset.date;
    const dayData   = CAL_DATA.by_date[date]  || null;
    const deadlines = CAL_DATA.deadlines[date] || null;

    const d = new Date(date + 'T12:00:00');
    document.getElementById('day-panel-title').textContent =
        d.toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

    let html = '';

    if (deadlines && deadlines.length > 0) {
        html += '<div class="panel-section"><strong>⚑ Comment deadlines</strong><ul>';
        deadlines.forEach(doc => {
            html += `<li><a href="${DOC_BASE}${doc.id}/">${doc.title}</a></li>`;
        });
        html += '</ul></div>';
    }

    if (dayData && dayData.docs.length > 0) {
        html += `<div class="panel-section"><strong>${dayData.docs.length} document${dayData.docs.length !== 1 ? 's' : ''} posted</strong><ul>`;
        dayData.docs.forEach(doc => {
            html += `<li><a href="${DOC_BASE}${doc.id}/">${doc.title}</a>`;
            if (doc.type) html += ` <span class="badge ${typeBadgeClass(doc.type)}">${typeShort(doc.type)}</span>`;
            html += `</li>`;
        });
        html += '</ul></div>';
    }

    document.getElementById('day-panel-content').innerHTML = html;
    const panel = document.getElementById('day-panel');
    panel.style.display = 'block';
    panel.scrollIntoView({behavior: 'smooth', block: 'nearest'});
}

function closePanel() {
    document.getElementById('day-panel').style.display = 'none';
}

buildCalendar();
</script>
{% endblock %}
